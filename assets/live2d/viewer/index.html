<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RcTool Live2D Viewer</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      color: #f9fbff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .stage {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.22), transparent 34%),
        linear-gradient(160deg, rgba(82, 111, 134, 0.24), rgba(200, 86, 127, 0.18));
    }

    #live2d-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .status {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(15, 20, 28, 0.58);
      color: rgba(249, 251, 255, 0.9);
      font-size: 13px;
      line-height: 1.45;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .status.ready {
      opacity: 0;
    }
  </style>
  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
</head>
<body>
  <main class="stage">
    <canvas id="live2d-canvas"></canvas>
    <div id="live2d-status" class="status">Loading Live2D runtime...</div>
  </main>

  <script src="./main.js"></script>
</body>
</html>

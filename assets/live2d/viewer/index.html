<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RcTool Live2D Viewer</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      color: #f9fbff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .stage {
      width: min(92vw, 760px);
      height: min(78vh, 680px);
      display: grid;
      place-items: center;
      position: relative;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.22), transparent 34%),
        linear-gradient(160deg, rgba(82, 111, 134, 0.24), rgba(200, 86, 127, 0.18));
      border: 1px solid rgba(255, 255, 255, 0.26);
      border-radius: 8px;
      box-shadow: 0 18px 42px rgba(15, 20, 28, 0.28);
    }

    .empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .title {
      margin: 0 0 8px;
      font-size: clamp(20px, 4vw, 34px);
      font-weight: 700;
    }

    .hint {
      margin: 0;
      max-width: 520px;
      color: rgba(249, 251, 255, 0.76);
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="stage">
    <canvas id="live2d-canvas"></canvas>
    <section class="empty" aria-label="Live2D viewer placeholder">
      <div>
        <p class="title">Live2D Viewer Ready</p>
        <p class="hint">
          WebView is ready. Add Cubism runtime scripts and a model3.json here to render the character.
        </p>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('live2d-canvas');
    const context = canvas.getContext('2d');

    function resizeCanvas() {
      const ratio = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.floor(rect.width * ratio);
      canvas.height = Math.floor(rect.height * ratio);
      context.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    window.live2dBridge = {
      loadModel(modelPath) {
        console.log(`Live2D model requested: ${modelPath}`);
      },
      playMotion(group, index) {
        console.log(`Live2D motion requested: ${group}:${index}`);
      },
      setExpression(name) {
        console.log(`Live2D expression requested: ${name}`);
      }
    };
  </script>
</body>
</html>
